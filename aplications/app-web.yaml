apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: review-filmes
  namespace: argocd
spec:
  project: exemplo-project
  source: #Target State
    repoURL: https://github.com/Marod12/web-page-deploy
    path: k8s/review
    targetRevision: HEAD
  destination: #Live State
    server: https://kubernetes.default.svc
    namespace: review
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
