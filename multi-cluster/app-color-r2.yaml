apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: webcolor-prod
  namespace: argocd
spec:
  project: exemplo-project
  source:
    repoURL: https://github.com/Marod12/web-page-deploy
    targetRevision: HEAD
    path: k8s/webcolor
  destination:
    server: https://100.87.137.249:45379
    namespace: webcolor
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
