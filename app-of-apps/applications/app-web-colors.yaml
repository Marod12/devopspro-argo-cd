apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: webcolors
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Marod12/devopspro-argo-cd.git
    targetRevision: HEAD
    path: app-of-apps/applications/webcolors  # webcolors
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
